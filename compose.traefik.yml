# Traefik deployment: reverse proxy with forward auth
# - Traefik handles TLS termination and authentication via ForwardAuth middleware
# - Web service is exposed through Traefik with PathPrefix routing
# - Backend services (postgres, redis, scanner) remain on internal network only
#
# Prerequisites:
# 1. Traefik must be running and connected to the 'shared' network
# 2. ForwardAuth middleware 'cas-auth' must be defined in Traefik config
# 3. Build web image with VITE_BASE_PATH matching TRAEFIK_PATH_PREFIX
#
# Usage:
#   docker compose --env-file .env.traefik -f compose.traefik.yml up -d

services:
  skill-scanner:
    image: ${SKILLHUB_SCANNER_IMAGE:-skillhub-scanner:traefik}
    build:
      context: ./scanner
    restart: unless-stopped
    environment:
      SKILL_SCANNER_LLM_API_KEY: ${SKILL_SCANNER_LLM_API_KEY:-}
      SKILL_SCANNER_LLM_BASE_URL: ${SKILL_SCANNER_LLM_BASE_URL:-}
      SKILL_SCANNER_LLM_MODEL: ${SKILL_SCANNER_LLM_MODEL:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-skillhub}
      POSTGRES_USER: ${POSTGRES_USER:-skillhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skillhub} -d ${POSTGRES_DB:-skillhub}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    image: ${SKILLHUB_SERVER_IMAGE:-skillhub-server:traefik}
    build:
      context: ./server
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-skillhub}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-skillhub}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      SKILLHUB_PUBLIC_BASE_URL: ${SKILLHUB_PUBLIC_BASE_URL}
      DEVICE_AUTH_VERIFICATION_URI: ${DEVICE_AUTH_VERIFICATION_URI:-}
      SKILLHUB_STORAGE_PROVIDER: ${SKILLHUB_STORAGE_PROVIDER:-s3}
      STORAGE_BASE_PATH: /var/lib/skillhub/storage
      SKILLHUB_STORAGE_S3_ENDPOINT: ${SKILLHUB_STORAGE_S3_ENDPOINT:-}
      SKILLHUB_STORAGE_S3_PUBLIC_ENDPOINT: ${SKILLHUB_STORAGE_S3_PUBLIC_ENDPOINT:-}
      SKILLHUB_STORAGE_S3_BUCKET: ${SKILLHUB_STORAGE_S3_BUCKET:-skillhub}
      SKILLHUB_STORAGE_S3_ACCESS_KEY: ${SKILLHUB_STORAGE_S3_ACCESS_KEY:-}
      SKILLHUB_STORAGE_S3_SECRET_KEY: ${SKILLHUB_STORAGE_S3_SECRET_KEY:-}
      SKILLHUB_STORAGE_S3_REGION: ${SKILLHUB_STORAGE_S3_REGION:-us-east-1}
      SKILLHUB_STORAGE_S3_FORCE_PATH_STYLE: ${SKILLHUB_STORAGE_S3_FORCE_PATH_STYLE:-false}
      SKILLHUB_STORAGE_S3_AUTO_CREATE_BUCKET: ${SKILLHUB_STORAGE_S3_AUTO_CREATE_BUCKET:-false}
      SKILLHUB_STORAGE_S3_PRESIGN_EXPIRY: ${SKILLHUB_STORAGE_S3_PRESIGN_EXPIRY:-PT10M}
      SKILLHUB_SECURITY_SCANNER_ENABLED: ${SKILLHUB_SECURITY_SCANNER_ENABLED:-true}
      SKILLHUB_SECURITY_SCANNER_URL: http://skill-scanner:8000
      SKILLHUB_SECURITY_SCANNER_MODE: upload
      SKILLHUB_AUTH_DIRECT_ENABLED: ${SKILLHUB_AUTH_DIRECT_ENABLED:-false}
      BOOTSTRAP_ADMIN_ENABLED: ${BOOTSTRAP_ADMIN_ENABLED:-false}
      BOOTSTRAP_ADMIN_USER_ID: ${BOOTSTRAP_ADMIN_USER_ID:-docker-admin}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-ChangeMe!2026}
      BOOTSTRAP_ADMIN_DISPLAY_NAME: ${BOOTSTRAP_ADMIN_DISPLAY_NAME:-Admin}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@skillhub.local}
      SKILLHUB_AUTH_TRUSTED_HEADER_ENABLED: ${SKILLHUB_AUTH_TRUSTED_HEADER_ENABLED:-true}
      SKILLHUB_AUTH_TRUSTED_HEADER_USER_ID_HEADER: ${SKILLHUB_AUTH_TRUSTED_HEADER_USER_ID_HEADER:-X-Forwarded-User}
      SKILLHUB_AUTH_TRUSTED_HEADER_EMAIL_HEADER: ${SKILLHUB_AUTH_TRUSTED_HEADER_EMAIL_HEADER:-X-Forwarded-Email}
      SKILLHUB_AUTH_TRUSTED_HEADER_DISPLAY_NAME_HEADER: ${SKILLHUB_AUTH_TRUSTED_HEADER_DISPLAY_NAME_HEADER:-X-Forwarded-Name}
      SKILLHUB_AUTH_TRUSTED_HEADER_AUTO_PROVISION: ${SKILLHUB_AUTH_TRUSTED_HEADER_AUTO_PROVISION:-true}
    volumes:
      - skillhub_storage:/var/lib/skillhub/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  web:
    image: ${SKILLHUB_WEB_IMAGE:-skillhub-web:traefik}
    build:
      context: ./web
      args:
        VITE_BASE_PATH: ${TRAEFIK_PATH_PREFIX:-/skillhub}
    restart: unless-stopped
    environment:
      SKILLHUB_API_UPSTREAM: ${SKILLHUB_API_UPSTREAM:-http://server:8080}
      SKILLHUB_WEB_API_BASE_URL: ${SKILLHUB_WEB_API_BASE_URL:-}
      SKILLHUB_PUBLIC_BASE_URL: ${SKILLHUB_PUBLIC_BASE_URL:-}
      SKILLHUB_WEB_AUTH_DIRECT_ENABLED: ${SKILLHUB_WEB_AUTH_DIRECT_ENABLED:-false}
      SKILLHUB_WEB_AUTH_DIRECT_PROVIDER: ${SKILLHUB_WEB_AUTH_DIRECT_PROVIDER:-}
      SKILLHUB_WEB_AUTH_TRUSTED_HEADER_ENABLED: ${SKILLHUB_WEB_AUTH_TRUSTED_HEADER_ENABLED:-true}
      SKILLHUB_WEB_AUTH_TRUSTED_HEADER_LOGOUT_URL: ${SKILLHUB_WEB_AUTH_TRUSTED_HEADER_LOGOUT_URL:-}
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/nginx-health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.skillhub-web.rule=PathPrefix(`${TRAEFIK_PATH_PREFIX:-/skillhub}`)
      - traefik.http.routers.skillhub-web.middlewares=cas-auth,skillhub-strip
      - traefik.http.middlewares.skillhub-strip.stripprefix.prefixes=${TRAEFIK_PATH_PREFIX:-/skillhub}
      - traefik.http.services.skillhub-web.loadbalancer.server.port=80
    networks:
      - default
      - shared

networks:
  shared:
    external: true

volumes:
  postgres_data:
  redis_data:
  skillhub_storage:
